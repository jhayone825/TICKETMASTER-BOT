<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticketmaster - Esperando respuesta...</title>
    <style>
        body {
            background-color: #f6f6f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #loader {
            text-align: center;
            display: block;
        }

        #error-screen {
            display: none;
            text-align: center;
            background-color: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-top: 5px solid #e10600;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #006cff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h1 { color: #cc0000; font-size: 24px; }
        p { font-size: 18px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Cargando ticketmaster.es...</p>
    </div>

    <div id="error-screen">
        <h1>ERROR DE ACCESO</h1>
        <p>CONÉCTESE A PIA VPN ANTES DE CONTINUAR PARA OBTENER ACCESO</p>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-screen').style.display = 'block';
            document.body.style.backgroundColor = "#1a1a1a"; // Darken background on error
        }, 8000);
    </script>

</body>
</html>
